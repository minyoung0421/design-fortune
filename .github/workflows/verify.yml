name: Design System Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: 토큰 준수 & 하드코딩 감지 ────────────────────────────────────────
  token-verify:
    name: Token & Hardcoding Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run verify.sh
        run: |
          chmod +x scripts/verify.sh
          bash scripts/verify.sh

  # ── Job 2: TypeScript 타입 검사 ──────────────────────────────────────────────
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: TypeScript type check
        run: bunx tsc --noEmit

  # ── Job 3: Vite 빌드 검증 ────────────────────────────────────────────────────
  build:
    name: Vite Build Check
    runs-on: ubuntu-latest
    needs: [token-verify, type-check]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Showcase
        run: bun run vite build

      - name: Build succeeded
        run: echo "✅ Showcase built successfully — dist/ ready"
